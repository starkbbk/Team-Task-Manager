[build]
builder = "NIXPACKS"

[build.env]
NIXPACKS_BUILD_CMD = "cd server && npm install && npx prisma generate && npx prisma migrate deploy && cd ../client && npm install && npm run build"

[deploy]
startCommand = "cd server && node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
